{% extends 'base.html' %}
{% block content %}
<div class="w-100 text-center">
    <div class="custom-card card-remix mx-auto shadow-lg">
        <h1 class="gradient-title mb-4">{{ txt.remix_title }}</h1>
        
        <form method="POST" enctype="multipart/form-data">
            <div class="drop-zone">
                <input type="file" name="audio_file" accept=".mp3, .wav, .ogg, audio/mpeg, audio/wav, audio/ogg" 
                       class="form-control form-control-lg bg-dark text-white border-0 mb-3" required>
                <p class="opacity-50 mb-0">mp3, wav, ogg</p>
            </div>
            
            <div class="mt-4 mx-auto" style="max-width: 350px;">
                <button type="submit" class="gradient-button">
                    <span class="gradient-text">{{ txt.save }}</span>
                </button>
            </div>
        </form>
    </div>
</div>

<a href="{{ url_for('index') }}" class="btn-back">← {{ txt.back }}</a>
{% endblock %}
