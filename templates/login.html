{% extends 'base.html' %}
{% block content %}
<div class="custom-card shadow-lg text-center">
    <h3 class="mb-4 fw-bold">Добро пожаловать!</h3>
    <form method="POST">
        <div class="mb-3">
            <input type="text" name="username" class="form-control form-control-lg text-center" placeholder="Логин" required>
        </div>
        <div class="mb-4">
            <input type="password" name="password" class="form-control form-control-lg text-center" placeholder="Пароль" required>
        </div>
        <div class="d-grid gap-3">
            <button name="action" value="login" class="btn btn-primary btn-lg">Войти</button>
            <button name="action" value="register" class="btn btn-outline-secondary">Регистрация</button>
        </div>
    </form>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<p class="text-danger mt-3">{{ messages[0] }}</p>{% endif %}
    {% endwith %}
</div>
{% endblock %}
