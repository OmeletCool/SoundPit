{% extends 'base.html' %}
{% block content %}
<div class="custom-card card-auth text-center shadow-lg">
    <form method="POST">
        <div class="mb-3">
            <input placeholder="login..." class="input" name="username" type="text" maxlength="20" required>
        </div>
        <div class="mb-4">
            <input placeholder="password..." class="input" name="password" type="password" required>
        </div>
        
        <button type="submit" name="action" value="login" class="gradient-button mb-4">
            <span class="gradient-text">{{ txt.login }}</span>
        </button>
        
        <button type="submit" name="action" value="register" class="btn-reg">
            {{ txt.reg }}
        </button>
    </form>
</div>
{% endblock %}
