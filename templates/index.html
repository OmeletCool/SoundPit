{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center" style="min-height: 60vh;">
    <div class="custom-card card-home text-center" style="max-width: 600px; width: 100%; padding: 30px;">
        
        <!-- 🔥 Поиск виден всем -->
        <form action="{{ url_for('search') }}" method="GET" class="search-form mt-3">
            <div class="search-container">
                <input type="text" name="q" id="search-input" class="input" placeholder="{{ txt.search_place }}" value="{{ request.args.get('q', '') }}" autocomplete="off">
                <div id="search-suggestions" class="suggestions-box"></div>
                <button type="submit" class="btn-search mt-2">{{ txt.send }}</button>
            </div>
        </form>
        
        {% if not session.get('user_id') %}
        <p class="text-white-50 mt-3 small">Для поиска войдите или зарегистрируйтесь</p>
        {% endif %}
    </div>
</div>

<script>
// Автодополнение для поиска групп
document.getElementById('search-input')?.addEventListener('input', function() {
    const query = this.value.trim();
    const suggestionsBox = document.getElementById('search-suggestions');
    
    if (query.length < 2) {
        suggestionsBox.innerHTML = '';
        return;
    }
    
    fetch('/api/suggest?q=' + encodeURIComponent(query))
        .then(response => response.json())
        .then(data => {
            if (data.suggestions.length > 0) {
                suggestionsBox.innerHTML = data.suggestions.map(band => 
                    `<div class="suggestion-item" onclick="selectBand('${band.name}')">${band.name}</div>`
                ).join('');
            } else {
                suggestionsBox.innerHTML = '';
            }
        })
        .catch(err => console.error(err));
});

function selectBand(name) {
    document.getElementById('search-input').value = name;
    document.getElementById('search-suggestions').innerHTML = '';
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-container')) {
        document.getElementById('search-suggestions').innerHTML = '';
    }
});
</script>
{% endblock %}
