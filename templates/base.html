<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Soundhole</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container position-relative">
            <div id="theme-toggle">☀️</div>
            <a class="navbar-brand text-uppercase" href="{{ url_for('index') }}">Soundhole</a>
            
            <div class="ms-auto d-flex align-items-center">
                <a href="{{ url_for('developers') }}" class="btn btn-link text-decoration-none" style="color: var(--text-color);">Разработчики</a>
                {% if session.get('user') %}
                    <span class="user-display-name mx-3" data-bs-toggle="modal" data-bs-target="#nameModal">{{ session['display_name'] }}</span>
                    <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-danger">Выход</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="container d-flex justify-content-center">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const html = document.documentElement;
        toggleBtn.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            toggleBtn.innerText = next === 'light' ? '🌙' : '☀️';
        });
    </script>
</body>
</html>
